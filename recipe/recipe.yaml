schema_version: 1

context:
  name: hep_ml
  version: "0.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c86f19ef85090eb689a7a2c452477f45f1f1b3c3aa53df0aba4bbd077bfb8a9b
  patches:
    - 0001-Remove-theano-from-deps.patch

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}
  run:
    - numpy >=1.9
    - pandas >=0.14.0
    - python >=${{ python_min }}
    - scikit-learn >=0.19
    - scipy >=0.15.0
    - six

tests:
  - python:
      imports:
        - hep_ml
        - hep_ml.experiments
  - requirements:
      run:
        - python ${{ python_min }}

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Machine Learning for High Energy Physics
  homepage: https://github.com/arogozhnikov/hep_ml
  repository: https://github.com/arogozhnikov/hep_ml
  documentation: https://github.com/arogozhnikov/hep_ml

extra:
  recipe-maintainers:
    - chrisburr

